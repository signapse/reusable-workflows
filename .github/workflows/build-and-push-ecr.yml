name: Build and Push to ECR

on:
  workflow_call:
    inputs:
      ecr_repository_uri:
        description: 'ECR repository URI (e.g., 123456789.dkr.ecr.us-east-1.amazonaws.com/my-app)'
        required: true
        type: string

      aws_region:
        description: 'AWS region where ECR repository is located'
        required: true
        type: string

      iam_role_arn:
        description: 'IAM role ARN for AWS authentication via OIDC'
        required: true
        type: string

      image_tag:
        description: 'Docker image tag (e.g., v1.0.0, release-tag). Will also tag as "latest"'
        required: true
        type: string

      docker_build_args:
        description: 'Docker build arguments (one per line, format: KEY=VALUE)'
        required: false
        type: string
        default: ''

      dockerfile_path:
        description: 'Path to Dockerfile (default: ./Dockerfile)'
        required: false
        type: string
        default: './Dockerfile'

      docker_context:
        description: 'Docker build context path (default: .)'
        required: false
        type: string
        default: '.'

      push_latest:
        description: 'Whether to push :latest tag in addition to specified tag'
        required: false
        type: boolean
        default: true

      environment:
        description: 'GitHub Environment name to pull variables from (e.g., development, staging, production)'
        required: false
        type: string
        default: ''

      # Build Engine
      use_buildx:
        description: 'Use Docker Buildx with GHA cache (recommended for faster builds)'
        required: false
        type: boolean
        default: false

      # Security Scanning
      enable_trivy_scan:
        description: 'Run Trivy vulnerability scan on the built image'
        required: false
        type: boolean
        default: false

      trivy_severity:
        description: 'Trivy severity levels to report'
        required: false
        type: string
        default: 'HIGH,CRITICAL'

      trivy_exit_code:
        description: 'Trivy exit code on findings (1 = fail the build, 0 = warn only)'
        required: false
        type: string
        default: '0'

    secrets:
      private_modules_token:
        description: 'Token passed as --build-arg GITHUB_TOKEN during Docker build (used for private Go/npm modules)'
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.iam_role_arn }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Collect environment build args
        id: collect-args
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_BUILD_ARGS: ${{ inputs.docker_build_args }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          # Start with explicit docker_build_args
          COMBINED_ARGS="${DOCKER_BUILD_ARGS}"

          # Fetch environment variables via GitHub API when environment is set
          if [ -n "${ENVIRONMENT}" ]; then
            echo "Fetching variables from environment: ${ENVIRONMENT}"
            ENV_VARS=$(gh api "repos/${{ github.repository }}/environments/${ENVIRONMENT}/variables" \
              --jq '.variables[] | "\(.name)=\(.value)"')

            if [ -n "${ENV_VARS}" ]; then
              if [ -n "${COMBINED_ARGS}" ]; then
                COMBINED_ARGS=$(printf '%s\n%s' "${COMBINED_ARGS}" "${ENV_VARS}")
              else
                COMBINED_ARGS="${ENV_VARS}"
              fi
              echo "Added environment variables from ${ENVIRONMENT}"
            fi

            # Append environment secrets if available
            if [ -n "${SENTRY_AUTH_TOKEN}" ]; then
              if [ -n "${COMBINED_ARGS}" ]; then
                COMBINED_ARGS=$(printf '%s\nSENTRY_AUTH_TOKEN=%s' "${COMBINED_ARGS}" "${SENTRY_AUTH_TOKEN}")
              else
                COMBINED_ARGS="SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}"
              fi
              echo "Added SENTRY_AUTH_TOKEN from environment secrets"
            fi
          fi

          # Output combined args (multiline)
          {
            echo "build_args<<ARGS_EOF"
            echo "${COMBINED_ARGS}"
            echo "ARGS_EOF"
          } >> "${GITHUB_OUTPUT}"

      # --- Buildx path (when use_buildx is true) ---

      - name: Set up Docker Buildx
        if: ${{ inputs.use_buildx }}
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        if: ${{ inputs.use_buildx }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.ecr_repository_uri }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=raw,value=latest,enable=${{ inputs.push_latest }}

      - name: Build and push with Buildx
        if: ${{ inputs.use_buildx }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ steps.collect-args.outputs.build_args }}
            ${{ secrets.private_modules_token && format('GITHUB_TOKEN={0}', secrets.private_modules_token) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Legacy path (when use_buildx is false — preserves existing behavior) ---

      - name: Build Docker Image
        if: ${{ !inputs.use_buildx }}
        id: build
        env:
          DOCKER_BUILDKIT: 0
          GITHUB_TOKEN_SECRET: ${{ secrets.private_modules_token }}
          COLLECTED_BUILD_ARGS: ${{ steps.collect-args.outputs.build_args }}
        run: |
          # Parse build args if provided
          BUILD_ARGS=""
          if [ -n "${COLLECTED_BUILD_ARGS}" ]; then
            while IFS= read -r line; do
              if [ -n "${line}" ]; then
                BUILD_ARGS="${BUILD_ARGS} --build-arg ${line}"
              fi
            done <<< "${COLLECTED_BUILD_ARGS}"
          fi

          # Append GITHUB_TOKEN build arg if the secret was provided
          if [ -n "$GITHUB_TOKEN_SECRET" ]; then
            BUILD_ARGS="$BUILD_ARGS --build-arg GITHUB_TOKEN=$GITHUB_TOKEN_SECRET"
          fi

          echo "Building Docker image with tag: ${{ inputs.image_tag }}"
          echo "Build args: $BUILD_ARGS"

          # Build image with latest tag
          docker build $BUILD_ARGS \
            -f ${{ inputs.dockerfile_path }} \
            -t ${{ inputs.ecr_repository_uri }}:latest \
            ${{ inputs.docker_context }}

      - name: Tag Docker Image
        if: ${{ !inputs.use_buildx }}
        run: |
          # Tag with specified version
          docker tag ${{ inputs.ecr_repository_uri }}:latest \
            ${{ inputs.ecr_repository_uri }}:${{ inputs.image_tag }}

          echo "Tagged image with: ${{ inputs.image_tag }}"

      - name: Push Docker Images to ECR
        if: ${{ !inputs.use_buildx }}
        run: |
          # Push versioned tag
          echo "Pushing ${{ inputs.ecr_repository_uri }}:${{ inputs.image_tag }}"
          docker push ${{ inputs.ecr_repository_uri }}:${{ inputs.image_tag }}

          # Push latest tag if enabled
          if [ "${{ inputs.push_latest }}" == "true" ]; then
            echo "Pushing ${{ inputs.ecr_repository_uri }}:latest"
            docker push ${{ inputs.ecr_repository_uri }}:latest
          fi

      # --- Security scanning (optional) ---

      - name: Run Trivy vulnerability scan
        if: ${{ inputs.enable_trivy_scan }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ inputs.ecr_repository_uri }}:${{ inputs.image_tag }}'
          format: 'table'
          severity: ${{ inputs.trivy_severity }}
          exit-code: ${{ inputs.trivy_exit_code }}

      - name: Create deploy_info.json
        run: |
          cat <<EOF > deploy_info.json
          {
            "image_uri_latest": "${{ inputs.ecr_repository_uri }}:latest",
            "image_uri_release": "${{ inputs.ecr_repository_uri }}:${{ inputs.image_tag }}",
            "version": "${{ inputs.image_tag }}",
            "commit_sha": "${{ github.sha }}",
            "repository": "${{ github.repository }}",
            "workflow_run_id": "${{ github.run_id }}",
            "workflow_run_number": "${{ github.run_number }}",
            "actor": "${{ github.actor }}",
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

          echo "Deploy info created:"
          cat deploy_info.json

      - name: Upload deploy_info.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy_info-${{ inputs.image_tag }}
          path: deploy_info.json
          retention-days: 90
          overwrite: true
