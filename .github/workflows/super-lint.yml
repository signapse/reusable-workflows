name: Super Linter

on:
  workflow_call:
    inputs:
      run-lint:
        description: "Run Super-Linter"
        required: false
        type: boolean
        default: true
      extra-super-linter-env:
        description: "Extra Super-Linter env vars as KEY=VALUE pairs separated by newlines (e.g. VALIDATE_CHECKOV=false)"
        required: false
        type: string
        default: ""
      disable-checkov:
        description: "Disable CHECKOV linter"
        required: false
        type: boolean
        default: false
      disable-jscpd:
        description: "Disable JSCPD linter"
        required: false
        type: boolean
        default: false
      disable-gitleaks:
        description: "Disable GITLEAKS linter"
        required: false
        type: boolean
        default: false

jobs:
  lint:
    if: ${{ inputs.run-lint }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full Git history for super-linter

      - name: Parse extra env vars
        if: ${{ inputs.extra-super-linter-env != '' }}
        run: |
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "$line" >> "$GITHUB_ENV"
          done <<< "${{ inputs.extra-super-linter-env }}"

      - name: Set linter overrides
        run: |
          if [ "${{ inputs.disable-checkov }}" = "true" ]; then
            echo "VALIDATE_CHECKOV=false" >> "$GITHUB_ENV"
          fi
          if [ "${{ inputs.disable-jscpd }}" = "true" ]; then
            echo "VALIDATE_JSCPD=false" >> "$GITHUB_ENV"
          fi
          if [ "${{ inputs.disable-gitleaks }}" = "true" ]; then
            echo "VALIDATE_GITLEAKS=false" >> "$GITHUB_ENV"
          fi

      - name: Run Super-Linter
        uses: github/super-linter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          LOG_LEVEL: NOTICE
          VALIDATE_JAVASCRIPT_STANDARD: false
          VALIDATE_TYPESCRIPT_STANDARD: false
