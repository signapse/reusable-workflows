name: Deploy Rust Lambda (Reusable)

on:
  workflow_call:
    inputs:
      rust_toolchain:
        description: 'Rust toolchain to use'
        required: false
        type: string
        default: 'stable'

      binary_name:
        description: 'Name of the binary to build (from Cargo.toml [[bin]] name, or package name)'
        required: true
        type: string

      build_target:
        description: 'Rust build target for Lambda'
        required: false
        type: string
        default: 'x86_64-unknown-linux-musl'

      zip_file_name:
        description: 'Name of the zip file to create'
        required: true
        type: string

      lambda_function_name:
        description: 'Name of the Lambda function to update (use this OR lambda_function_name_secret)'
        required: false
        type: string
        default: ''

      s3_bucket:
        description: 'S3 bucket name for Lambda deployment'
        required: true
        type: string

      s3_key:
        description: 'S3 key/path for the Lambda zip file'
        required: true
        type: string

      aws_region:
        description: 'AWS region'
        required: false
        type: string
        default: 'eu-west-2'

      aws_role_arn:
        description: 'AWS IAM role ARN for OIDC authentication'
        required: true
        type: string

      cargo_build_flags:
        description: 'Additional cargo build flags (e.g., --features "feature1,feature2")'
        required: false
        type: string
        default: ''

      app_version:
        description: 'Application version to display in the Lambda description'
        required: false
        type: string
        default: ''

      publish_version:
        description: 'Publish a new Lambda version after deployment'
        required: false
        type: boolean
        default: false

      update_alias:
        description: 'Lambda alias to update (e.g., "live", "production"). Leave empty to skip.'
        required: false
        type: string
        default: ''

      verify_deployment:
        description: 'Verify function reaches Active state after update'
        required: false
        type: boolean
        default: false

      smoke_test_payload:
        description: 'JSON payload for smoke test invocation (leave empty to skip smoke test)'
        required: false
        type: string
        default: ''

    secrets:
      lambda_function_name_secret:
        description: 'Lambda function name from secrets (alternative to lambda_function_name input)'
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust_toolchain }}
          targets: ${{ inputs.build_target }}

      - name: Install musl tools
        if: contains(inputs.build_target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lambda-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lambda-

      - name: Build Lambda function
        run: |
          cargo build --release --target ${{ inputs.build_target }} ${{ inputs.cargo_build_flags }}

          # Lambda expects the binary to be named 'bootstrap' for provided.al2023 runtime
          cp target/${{ inputs.build_target }}/release/${{ inputs.binary_name }} bootstrap
          zip ${{ inputs.zip_file_name }} bootstrap

          echo "Built and zipped Lambda function: ${{ inputs.zip_file_name }}"
          ls -lh ${{ inputs.zip_file_name }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Resolve function name
        id: resolve-name
        run: |
          if [ -n "${{ inputs.lambda_function_name }}" ]; then
            echo "function_name=${{ inputs.lambda_function_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.lambda_function_name_secret }}" ]; then
            echo "function_name=${{ secrets.lambda_function_name_secret }}" >> $GITHUB_OUTPUT
          else
            echo "Error: Either lambda_function_name input or lambda_function_name_secret must be provided"
            exit 1
          fi

      - name: Upload to S3
        run: |
          aws s3 cp ${{ inputs.zip_file_name }} s3://${{ inputs.s3_bucket }}/${{ inputs.s3_key }}
          echo "Uploaded to S3: s3://${{ inputs.s3_bucket }}/${{ inputs.s3_key }}"

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name "${{ steps.resolve-name.outputs.function_name }}" \
            --s3-bucket ${{ inputs.s3_bucket }} \
            --s3-key ${{ inputs.s3_key }} \
            --region ${{ inputs.aws_region }}
          echo "Lambda function updated successfully"

      - name: Wait for Lambda update to complete
        run: |
          echo "Waiting for Lambda function update to complete..."
          aws lambda wait function-updated \
            --function-name "${{ steps.resolve-name.outputs.function_name }}" \
            --region ${{ inputs.aws_region }}
          echo "Lambda function is now active and updated"

      - name: Update Lambda description with version
        if: ${{ inputs.app_version != '' }}
        run: |
          FUNC_NAME="${{ steps.resolve-name.outputs.function_name }}"
          DESCRIPTION="Version: ${{ inputs.app_version }} | Deployed: $(date -u +"%Y-%m-%dT%H:%M:%SZ") | Commit: ${GITHUB_SHA:0:7}"

          aws lambda update-function-configuration \
            --function-name "${FUNC_NAME}" \
            --description "${DESCRIPTION}" \
            --region ${{ inputs.aws_region }}

          echo "Updated description: ${DESCRIPTION}"

          aws lambda wait function-updated \
            --function-name "${FUNC_NAME}" \
            --region ${{ inputs.aws_region }}

      - name: Publish version
        if: ${{ inputs.publish_version }}
        id: publish-version
        run: |
          RESULT=$(aws lambda publish-version \
            --function-name "${{ steps.resolve-name.outputs.function_name }}" \
            --output json)

          VERSION=$(echo "$RESULT" | jq -r '.Version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Published version: $VERSION"

      - name: Update alias
        if: ${{ inputs.update_alias != '' && inputs.publish_version }}
        run: |
          FUNC_NAME="${{ steps.resolve-name.outputs.function_name }}"
          VERSION="${{ steps.publish-version.outputs.version }}"

          if aws lambda get-alias \
            --function-name "$FUNC_NAME" \
            --name "${{ inputs.update_alias }}" \
            >/dev/null 2>&1; then
            aws lambda update-alias \
              --function-name "$FUNC_NAME" \
              --name "${{ inputs.update_alias }}" \
              --function-version "$VERSION"
          else
            aws lambda create-alias \
              --function-name "$FUNC_NAME" \
              --name "${{ inputs.update_alias }}" \
              --function-version "$VERSION"
          fi

          echo "Alias '${{ inputs.update_alias }}' now points to version $VERSION"

      - name: Verify deployment
        if: ${{ inputs.verify_deployment }}
        run: |
          FUNC_INFO=$(aws lambda get-function \
            --function-name "${{ steps.resolve-name.outputs.function_name }}" \
            --output json)

          STATE=$(echo "$FUNC_INFO" | jq -r '.Configuration.State')
          LAST_UPDATE=$(echo "$FUNC_INFO" | jq -r '.Configuration.LastUpdateStatus')

          echo "State: $STATE"
          echo "Last Update Status: $LAST_UPDATE"

          if [ "$STATE" != "Active" ] || [ "$LAST_UPDATE" != "Successful" ]; then
            echo "Deployment verification failed!"
            exit 1
          fi

          echo "Deployment verified successfully"

      - name: Smoke test
        if: ${{ inputs.smoke_test_payload != '' }}
        run: |
          FUNC_NAME="${{ steps.resolve-name.outputs.function_name }}"

          QUALIFIER=""
          if [ -n "${{ inputs.update_alias }}" ] && [ "${{ inputs.publish_version }}" == "true" ]; then
            QUALIFIER="--qualifier ${{ inputs.update_alias }}"
          fi

          aws lambda invoke \
            --function-name "$FUNC_NAME" \
            $QUALIFIER \
            --payload '${{ inputs.smoke_test_payload }}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/smoke-test-response.json

          echo "Response:"
          cat /tmp/smoke-test-response.json
          echo ""

      - name: Get Lambda function info
        run: |
          aws lambda get-function \
            --function-name "${{ steps.resolve-name.outputs.function_name }}" \
            --region ${{ inputs.aws_region }} \
            --query 'Configuration.[FunctionName,LastModified,CodeSize,Version]' \
            --output table
