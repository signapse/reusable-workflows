name: Deploy Go Lambda (Reusable)

on:
  workflow_call:
    inputs:
      go_version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.23'

      main_file_path:
        description: 'Path to the main.go file (e.g., cmd/api/lambda/main.go)'
        required: true
        type: string

      output_binary_name:
        description: 'Name of the output binary'
        required: false
        type: string
        default: 'bootstrap'

      zip_file_name:
        description: 'Name of the zip file to create'
        required: true
        type: string

      lambda_function_name:
        description: 'Name of the Lambda function to update (use this OR lambda_function_name_secret)'
        required: false
        type: string
        default: ''

      s3_bucket:
        description: 'S3 bucket name for Lambda deployment'
        required: true
        type: string

      s3_key:
        description: 'S3 key/path for the Lambda zip file (e.g., hub-platform-api/function.zip)'
        required: true
        type: string

      aws_region:
        description: 'AWS region'
        required: false
        type: string
        default: 'eu-west-2'

      aws_role_arn:
        description: 'AWS IAM role ARN for OIDC authentication'
        required: true
        type: string

      goprivate:
        description: 'GOPRIVATE environment variable value'
        required: false
        type: string
        default: 'github.com/signapse/*'

      enable_private_repos:
        description: 'Enable access to private repos using PAT'
        required: false
        type: boolean
        default: false

      go_build_flags:
        description: 'Additional Go build flags (e.g., -ldflags="-s -w")'
        required: false
        type: string
        default: ''

      # Deployment Options
      publish_version:
        description: 'Publish a new Lambda version after deployment'
        required: false
        type: boolean
        default: false

      update_alias:
        description: 'Lambda alias to update (e.g., "live", "production"). Leave empty to skip.'
        required: false
        type: string
        default: ''

      verify_deployment:
        description: 'Verify function reaches Active state after update'
        required: false
        type: boolean
        default: false

      smoke_test_payload:
        description: 'JSON payload for smoke test invocation (leave empty to skip smoke test)'
        required: false
        type: string
        default: ''

    secrets:
      github_pat:
        description: 'GitHub PAT for accessing private repositories'
        required: false

      lambda_function_name_secret:
        description: 'Lambda function name from secrets (alternative to lambda_function_name input, for per-environment secrets)'
        required: false

permissions:
  id-token: write   # Required for OIDC authentication
  contents: read    # Required to checkout code

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: Configure access to private repos
        if: ${{ inputs.enable_private_repos }}
        run: |
          git config --global url."https://${{ secrets.github_pat }}@github.com/".insteadOf "https://github.com/"
        env:
          GOPRIVATE: ${{ inputs.goprivate }}

      - name: Build Lambda function
        run: |
          go build ${{ inputs.go_build_flags }} -o ${{ inputs.output_binary_name }} ${{ inputs.main_file_path }}
          zip ${{ inputs.zip_file_name }} ${{ inputs.output_binary_name }}
          echo "Built and zipped Lambda function: ${{ inputs.zip_file_name }}"
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
          GOPRIVATE: ${{ inputs.goprivate }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Resolve function name
        id: resolve-name
        run: |
          if [ -n "${{ inputs.lambda_function_name }}" ]; then
            echo "function_name=${{ inputs.lambda_function_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.lambda_function_name_secret }}" ]; then
            echo "function_name=${{ secrets.lambda_function_name_secret }}" >> $GITHUB_OUTPUT
          else
            echo "Error: Either lambda_function_name input or lambda_function_name_secret must be provided"
            exit 1
          fi

      - name: Upload to S3
        run: |
          aws s3 cp ${{ inputs.zip_file_name }} s3://${{ inputs.s3_bucket }}/${{ inputs.s3_key }}
          echo "Uploaded to S3: s3://${{ inputs.s3_bucket }}/${{ inputs.s3_key }}"

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name "${{ steps.resolve-name.outputs.function_name }}" \
            --s3-bucket ${{ inputs.s3_bucket }} \
            --s3-key ${{ inputs.s3_key }} \
            --region ${{ inputs.aws_region }}
          echo "Lambda function updated successfully"

      - name: Wait for Lambda update to complete
        run: |
          echo "Waiting for Lambda function update to complete..."
          aws lambda wait function-updated \
            --function-name "${{ steps.resolve-name.outputs.function_name }}" \
            --region ${{ inputs.aws_region }}
          echo "Lambda function is now active and updated"

      - name: Publish version
        if: ${{ inputs.publish_version }}
        id: publish-version
        run: |
          RESULT=$(aws lambda publish-version \
            --function-name "${{ steps.resolve-name.outputs.function_name }}" \
            --output json)

          VERSION=$(echo "$RESULT" | jq -r '.Version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Published version: $VERSION"

      - name: Update alias
        if: ${{ inputs.update_alias != '' && inputs.publish_version }}
        run: |
          FUNC_NAME="${{ steps.resolve-name.outputs.function_name }}"
          VERSION="${{ steps.publish-version.outputs.version }}"

          if aws lambda get-alias \
            --function-name "$FUNC_NAME" \
            --name "${{ inputs.update_alias }}" \
            >/dev/null 2>&1; then
            aws lambda update-alias \
              --function-name "$FUNC_NAME" \
              --name "${{ inputs.update_alias }}" \
              --function-version "$VERSION"
          else
            aws lambda create-alias \
              --function-name "$FUNC_NAME" \
              --name "${{ inputs.update_alias }}" \
              --function-version "$VERSION"
          fi

          echo "Alias '${{ inputs.update_alias }}' now points to version $VERSION"

      - name: Verify deployment
        if: ${{ inputs.verify_deployment }}
        run: |
          FUNC_INFO=$(aws lambda get-function \
            --function-name "${{ steps.resolve-name.outputs.function_name }}" \
            --output json)

          STATE=$(echo "$FUNC_INFO" | jq -r '.Configuration.State')
          LAST_UPDATE=$(echo "$FUNC_INFO" | jq -r '.Configuration.LastUpdateStatus')

          echo "State: $STATE"
          echo "Last Update Status: $LAST_UPDATE"

          if [ "$STATE" != "Active" ] || [ "$LAST_UPDATE" != "Successful" ]; then
            echo "Deployment verification failed!"
            exit 1
          fi

          echo "Deployment verified successfully"

      - name: Smoke test
        if: ${{ inputs.smoke_test_payload != '' }}
        run: |
          FUNC_NAME="${{ steps.resolve-name.outputs.function_name }}"

          QUALIFIER=""
          if [ -n "${{ inputs.update_alias }}" ] && [ "${{ inputs.publish_version }}" == "true" ]; then
            QUALIFIER="--qualifier ${{ inputs.update_alias }}"
          fi

          aws lambda invoke \
            --function-name "$FUNC_NAME" \
            $QUALIFIER \
            --payload '${{ inputs.smoke_test_payload }}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/smoke-test-response.json

          echo "Response:"
          cat /tmp/smoke-test-response.json
          echo ""

      - name: Get Lambda function info
        run: |
          aws lambda get-function \
            --function-name "${{ steps.resolve-name.outputs.function_name }}" \
            --region ${{ inputs.aws_region }} \
            --query 'Configuration.[FunctionName,LastModified,CodeSize,Version]' \
            --output table
