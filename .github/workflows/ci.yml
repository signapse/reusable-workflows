name: CI

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '18'

      package-manager:
        description: 'Package manager (npm, yarn, pnpm)'
        required: false
        type: string
        default: 'npm'

      run-lint:
        description: 'Run Super-Linter'
        required: false
        type: boolean
        default: true

      run-tests:
        description: 'Run unit tests'
        required: false
        type: boolean
        default: true

      run-build:
        description: 'Run build step'
        required: false
        type: boolean
        default: true

      build-command:
        description: 'Build command to run'
        required: false
        type: string
        default: 'npm run build'

      lint-command:
        description: 'Lint command to run'
        required: false
        type: string
        default: 'npm run lint'

      test-command:
        description: 'Test command to run'
        required: false
        type: string
        default: 'npm test'

      disable-checkov:
        description: 'Disable CHECKOV linter'
        required: false
        type: boolean
        default: false

      disable-jscpd:
        description: 'Disable JSCPD linter'
        required: false
        type: boolean
        default: false

      disable-gitleaks:
        description: 'Disable GITLEAKS linter'
        required: false
        type: boolean
        default: false

      extra-super-linter-env:
        description: 'Extra Super-Linter env vars as KEY=VALUE pairs separated by newlines'
        required: false
        type: string
        default: ''

jobs:
  lint:
    if: ${{ inputs.run-lint }}
    uses: signapse/reusable-workflows/.github/workflows/super-lint.yml@main
    with:
      run-lint: true
      disable-checkov: ${{ inputs.disable-checkov }}
      disable-jscpd: ${{ inputs.disable-jscpd }}
      disable-gitleaks: ${{ inputs.disable-gitleaks }}
      extra-super-linter-env: ${{ inputs.extra-super-linter-env }}

  frontend-ci:
    if: ${{ inputs.run-tests || inputs.run-build }}
    uses: signapse/reusable-workflows/.github/workflows/frontend-ci.yml@main
    with:
      node-version: ${{ inputs.node-version }}
      package-manager: ${{ inputs.package-manager }}
      run-lint: false
      run-tests: ${{ inputs.run-tests }}
      run-build: ${{ inputs.run-build }}
      build-command: ${{ inputs.build-command }}
      lint-command: ${{ inputs.lint-command }}
      test-command: ${{ inputs.test-command }}
